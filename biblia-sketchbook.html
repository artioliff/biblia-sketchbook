<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bíblia Sketchbook — Linha do Tempo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6EED8;
  --bg2: #EBE0C0;
  --bg3: #F9F4E6;
  --ink: #2A1A0C;
  --ink2: #5A3920;
  --ink3: #9C7D5A;
  --gold: #B07B10;
  --gold-light: #D4A020;
  --line: #C09030;
  --card-bg: #FAF4E4;
  --border: rgba(176, 123, 16, 0.28);
  --border2: rgba(176, 123, 16, 0.15);
}

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'EB Garamond', Georgia, serif;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  user-select: none;
}

/* ── HEADER ────────────────────────────────── */
header {
  height: 58px;
  padding: 0 28px;
  display: flex;
  align-items: center;
  gap: 28px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
}

.logo {
  font-family: 'Cinzel', serif;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 0.08em;
  white-space: nowrap;
  color: var(--ink);
}
.logo em { color: var(--gold); font-style: normal; }

.filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  scrollbar-width: none;
  flex: 1;
}
.filters::-webkit-scrollbar { display: none; }

.filter-btn {
  padding: 4px 13px;
  border: 1px solid var(--border);
  border-radius: 2px;
  background: transparent;
  color: var(--ink2);
  font-family: 'EB Garamond', serif;
  font-size: 13px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .18s;
  letter-spacing: 0.06em;
}
.filter-btn:hover { background: var(--bg2); color: var(--ink); }
.filter-btn.active { background: var(--ink); color: var(--bg); border-color: var(--ink); }

/* ── TIMELINE AREA ─────────────────────────── */
.tl-wrapper {
  flex: 1;
  position: relative;
  overflow: hidden;
  min-height: 0;
}

.tl-scroll {
  width: 100%;
  height: 100%;
  overflow-x: scroll;
  overflow-y: hidden;
  scrollbar-width: none;
  cursor: grab;
  position: relative;
}
.tl-scroll::-webkit-scrollbar { display: none; }
.tl-scroll.grabbing { cursor: grabbing; }

.tl-canvas {
  height: 100%;
  position: relative;
}

/* Horizontal spine */
.tl-line {
  position: absolute;
  top: 50%;
  left: 0; right: 0;
  height: 1px;
  background: linear-gradient(to right, transparent, var(--line) 60px, var(--line) calc(100% - 60px), transparent);
  transform: translateY(-50%);
  opacity: .5;
}

/* ── CARDS ─────────────────────────────────── */
.ev-card {
  position: absolute;
  width: 218px;
  background: var(--card-bg);
  border: 1px solid var(--border);
  padding: 14px 15px 12px;
  cursor: pointer;
  transition: transform .2s, box-shadow .2s, opacity .25s;
}
.ev-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 28px rgba(42,26,12,.13);
  z-index: 5;
}
.ev-card.dim { opacity: .08; pointer-events: none; }

.card-yr {
  font-size: 11.5px;
  color: var(--ink3);
  letter-spacing: .1em;
  margin-bottom: 4px;
}
.card-title {
  font-family: 'Cinzel', serif;
  font-size: 14.5px;
  font-weight: 600;
  color: var(--ink);
  line-height: 1.32;
  margin-bottom: 7px;
}
.card-badge {
  display: inline-block;
  padding: 2px 8px;
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  border-radius: 1px;
  margin-bottom: 8px;
  border: 1px solid;
}
.card-desc {
  font-size: 12.5px;
  color: var(--ink2);
  line-height: 1.55;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-chars {
  margin-top: 9px;
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.char-pill {
  font-size: 11px;
  color: var(--ink3);
  border: 1px solid var(--border2);
  padding: 1px 6px;
}

/* Timeline dot */
.tl-dot {
  position: absolute;
  width: 9px; height: 9px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--gold);
  transform: translateX(-50%) translateY(-50%);
  z-index: 3;
}

/* Stem */
.tl-stem {
  position: absolute;
  width: 1px;
  background: var(--border);
  left: 0;
}

/* Year tag on line */
.tl-yr-tag {
  position: absolute;
  transform: translateX(-50%);
  font-size: 10.5px;
  color: var(--ink3);
  letter-spacing: .08em;
  white-space: nowrap;
  pointer-events: none;
}

/* ── CATEGORY COLORS ───────────────────────── */
.c-criacao    { color:#7A4F00; background:rgba(192,144,48,.12); border-color:rgba(192,144,48,.35); }
.c-patriarcas { color:#1A4A2E; background:rgba(26,74,46,.12);  border-color:rgba(26,74,46,.35); }
.c-exodo      { color:#1E3A5F; background:rgba(30,58,95,.12);  border-color:rgba(30,58,95,.35); }
.c-monarquia  { color:#4A1E6A; background:rgba(74,30,106,.12); border-color:rgba(74,30,106,.35); }
.c-profetas   { color:#8B2020; background:rgba(139,32,32,.12); border-color:rgba(139,32,32,.35); }
.c-retorno    { color:#1A4A4A; background:rgba(26,74,74,.12);  border-color:rgba(26,74,74,.35); }
.c-evangelhos { color:#7A3800; background:rgba(184,88,16,.12); border-color:rgba(184,88,16,.35); }
.c-igreja     { color:#3C2806; background:rgba(80,56,16,.12);  border-color:rgba(80,56,16,.35); }

/* ── FOOTER MINIMAP ────────────────────────── */
footer {
  height: 72px;
  border-top: 1px solid var(--border);
  padding: 8px 24px 10px;
  flex-shrink: 0;
  background: var(--bg);
  position: relative;
}
.mm-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10.5px;
  color: var(--ink3);
  letter-spacing: .1em;
  margin-bottom: 6px;
}
.mm-track {
  position: relative;
  height: 34px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 2px;
  overflow: hidden;
  cursor: pointer;
}
.mm-line {
  position: absolute;
  top: 50%; left: 0; right: 0;
  height: 1px;
  background: var(--line);
  opacity: .35;
  transform: translateY(-50%);
}
.mm-dot {
  position: absolute;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--gold-light);
  top: 50%;
  transform: translateY(-50%);
  opacity: .7;
}
.mm-viewport {
  position: absolute;
  top: 0; bottom: 0;
  background: rgba(42,26,12,.07);
  border-left: 1px solid rgba(176,123,16,.5);
  border-right: 1px solid rgba(176,123,16,.5);
}

/* ── DETAIL PANEL ─────────────────────────── */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(42,26,12,.55);
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.detail {
  position: relative;
  background: var(--card-bg);
  border: 1px solid var(--border);
  width: 540px;
  max-width: 92vw;
  max-height: 82vh;
  overflow-y: auto;
  padding: 32px 36px 36px;
  transform: translateY(16px);
  transition: transform .25s;
}
.overlay.open .detail { transform: translateY(0); }

.d-yr { font-size: 13px; color: var(--ink3); letter-spacing: .1em; margin-bottom: 5px; }
.d-title { font-family: 'Cinzel', serif; font-size: 24px; font-weight: 700; line-height: 1.25; margin-bottom: 10px; }
.d-book { font-style: italic; color: var(--gold); font-size: 14.5px; margin-bottom: 16px; }
.d-desc { font-size: 16px; line-height: 1.75; color: var(--ink2); margin-bottom: 22px; }
.d-sec { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: .18em; text-transform: uppercase; color: var(--ink3); margin-bottom: 9px; }
.d-chars { display: flex; flex-wrap: wrap; gap: 6px; }
.d-char {
  padding: 5px 13px;
  border: 1px solid var(--border);
  font-size: 14px;
  color: var(--ink2);
  cursor: pointer;
  transition: background .18s;
}
.d-char:hover { background: var(--bg2); }
.d-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none; border: none;
  font-size: 18px;
  cursor: pointer;
  color: var(--ink3);
  font-family: 'EB Garamond', serif;
  line-height: 1;
  padding: 4px 6px;
}
.d-close:hover { color: var(--ink); }

/* Drag hint */
.drag-hint {
  position: absolute;
  bottom: 78px; left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--ink3);
  letter-spacing: .12em;
  opacity: .55;
  pointer-events: none;
  font-family: 'EB Garamond', serif;
  white-space: nowrap;
}
</style>
</head>
<body>

<header>
  <div class="logo">BÍBLIA <em>SKETCHBOOK</em></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" data-cat="all">TODOS</button>
    <button class="filter-btn" data-cat="criacao">✦ CRIAÇÃO</button>
    <button class="filter-btn" data-cat="patriarcas">◈ PATRIARCAS</button>
    <button class="filter-btn" data-cat="exodo">◆ ÊXODO</button>
    <button class="filter-btn" data-cat="monarquia">♛ MONARQUIA</button>
    <button class="filter-btn" data-cat="profetas">◉ PROFETAS</button>
    <button class="filter-btn" data-cat="retorno">⬡ RETORNO</button>
    <button class="filter-btn" data-cat="evangelhos">☩ EVANGELHOS</button>
    <button class="filter-btn" data-cat="igreja">◇ IGREJA</button>
  </div>
</header>

<div class="tl-wrapper">
  <div class="tl-scroll" id="tlScroll">
    <div class="tl-canvas" id="tlCanvas">
      <div class="tl-line"></div>
    </div>
  </div>
  <div class="drag-hint">← arraste para navegar →</div>
</div>

<footer>
  <div class="mm-labels">
    <span>~4000 AC</span>
    <span style="letter-spacing:.14em">LINHA DO TEMPO BÍBLICA</span>
    <span>~95 DC</span>
  </div>
  <div class="mm-track" id="mmTrack">
    <div class="mm-line"></div>
  </div>
</footer>

<div class="overlay" id="overlay">
  <div class="detail" id="detail">
    <button class="d-close" id="dClose">✕</button>
    <div class="d-yr" id="dYr"></div>
    <div class="d-title" id="dTitle"></div>
    <div class="d-book" id="dBook"></div>
    <div class="d-desc" id="dDesc"></div>
    <div class="d-sec">Personagens</div>
    <div class="d-chars" id="dChars"></div>
  </div>
</div>

<script>
const CAT = {
  criacao:    "Criação",
  patriarcas: "Patriarcas",
  exodo:      "Êxodo",
  monarquia:  "Monarquia",
  profetas:   "Profetas",
  retorno:    "Retorno",
  evangelhos: "Evangelhos",
  igreja:     "Igreja"
};

const EVENTS = [
  { yr:"~4000 AC", t:"A Criação", cat:"criacao", bk:"Gênesis 1–2",
    ch:["Adão","Eva"],
    d:"Deus cria o céu, a terra e o ser humano em seis dias. Luz, vida e ordem emergindo do caos primordial — o início de toda a história bíblica." },
  { yr:"~3900 AC", t:"A Queda no Éden", cat:"criacao", bk:"Gênesis 3",
    ch:["Adão","Eva","Serpente"],
    d:"Adão e Eva desobedecem a Deus no jardim do Éden, comendo do fruto proibido. A entrada do pecado no mundo muda o curso de toda a humanidade." },
  { yr:"~2350 AC", t:"O Dilúvio — Noé", cat:"patriarcas", bk:"Gênesis 6–9",
    ch:["Noé","Sem","Cão","Jafé"],
    d:"Deus envia um dilúvio para purificar a terra corrompida. Noé constrói uma arca por fé, salva sua família e os animais. Um arco-íris sela uma nova aliança." },
  { yr:"~2000 AC", t:"Aliança com Abraão", cat:"patriarcas", bk:"Gênesis 12–17",
    ch:["Abraão","Sara","Ló","Agar"],
    d:"Deus chama Abraão para deixar tudo e ir para uma terra desconhecida. Faz uma aliança eterna: sua descendência seria tão numerosa quanto as estrelas do céu." },
  { yr:"~1900 AC", t:"Isaac e as Promessas", cat:"patriarcas", bk:"Gênesis 21–26",
    ch:["Isaac","Rebeca","Abraão"],
    d:"Nascido de pais idosos por milagre divino, Isaac herda todas as promessas de Abraão. Sua história inclui o episódio dramático do sacrifício no Monte Moriá." },
  { yr:"~1850 AC", t:"Jacó — Pai das Tribos", cat:"patriarcas", bk:"Gênesis 27–35",
    ch:["Jacó","Esaú","Raquel","Lia","Labão"],
    d:"Jacó rouba a bênção do irmão, foge, casa-se com Raquel e Lia, tem doze filhos. Após lutar com um anjo, recebe o nome Israel — pai das doze tribos." },
  { yr:"~1800 AC", t:"José no Egito", cat:"patriarcas", bk:"Gênesis 37–50",
    ch:["José","Jacó","Benjamim","Faraó"],
    d:"Vendido como escravo pelos próprios irmãos, José sobe ao poder no Egito pelo dom de interpretar sonhos. Salva o mundo antigo de uma devastadora fome." },
  { yr:"~1450 AC", t:"O Êxodo — Moisés", cat:"exodo", bk:"Êxodo 1–15",
    ch:["Moisés","Arão","Miriã","Faraó","Séfora"],
    d:"Moisés lidera o povo hebreu para fora do Egito após dez pragas devastadoras. A abertura do mar Vermelho é o grande ato libertador do Antigo Testamento." },
  { yr:"~1446 AC", t:"Os Dez Mandamentos", cat:"exodo", bk:"Êxodo 20; Deuteronômio 5",
    ch:["Moisés","Deus"],
    d:"No Monte Sinai, entre trovões e relâmpagos, Deus entrega os dez mandamentos a Moisés. A base moral e jurídica que moldaria toda a civilização ocidental." },
  { yr:"~1406 AC", t:"Entrada em Canaã — Josué", cat:"exodo", bk:"Josué 1–6",
    ch:["Josué","Raabe","Calebe"],
    d:"Após 40 anos de peregrinação no deserto, Israel finalmente entra na Terra Prometida. As muralhas de Jericó caem ao som de trombetas e gritos de louvor." },
  { yr:"~1200 AC", t:"A Era dos Juízes", cat:"monarquia", bk:"Juízes; Rute",
    ch:["Débora","Gideão","Sansão","Rute","Boaz"],
    d:"Israel oscila entre fidelidade e apostasia. Juízes carismáticos lideram o povo em ciclos dolorosos de pecado, opressão, arrependimento e restauração." },
  { yr:"~1050 AC", t:"Saul — Primeiro Rei", cat:"monarquia", bk:"1 Samuel 9–31",
    ch:["Saul","Samuel","Jônatas","Davi"],
    d:"O povo exige um rei como as outras nações. Samuel unge Saul, mas sua desobediência leva à rejeição divina. A tragédia do primeiro rei de Israel." },
  { yr:"~1010 AC", t:"Davi — Rei e Poeta", cat:"monarquia", bk:"2 Samuel; 1 Crônicas; Salmos",
    ch:["Davi","Jônatas","Bate-Seba","Natã","Absalão","Golias"],
    d:"O pastorzinho ungido rei. Guerreiro, músico e autor dos Salmos, Davi é o 'varão segundo o coração de Deus'. Sua linhagem dará origem ao próprio Messias." },
  { yr:"~970 AC", t:"Salomão — O Grande Templo", cat:"monarquia", bk:"1 Reis 3–11; Provérbios; Eclesiastes",
    ch:["Salomão","Rainha de Sabá","Hiram de Tiro"],
    d:"Filho de Davi, Salomão constrói o magnífico Templo de Jerusalém e é celebrado como o homem mais sábio da história. Sua queda vem pelas muitas esposas estrangeiras." },
  { yr:"~930 AC", t:"Divisão do Reino", cat:"monarquia", bk:"1 Reis 12",
    ch:["Roboão","Jeroboão","Aías"],
    d:"Após a morte de Salomão, o reino se divide: Israel ao norte com dez tribos, Judá ao sul com duas. Uma ferida que nunca seria curada antes do exílio babilônico." },
  { yr:"~860 AC", t:"Elias — Fogo do Céu", cat:"profetas", bk:"1 Reis 17–21; 2 Reis 2",
    ch:["Elias","Acabe","Jezabel","Eliseu","Obadias"],
    d:"O profeta de fogo desafia sozinho 450 profetas de Baal no Monte Carmelo. Vida de milagres intensos e momentos de profundo desânimo. Arrebatado ao céu num carro de fogo." },
  { yr:"~750 AC", t:"Amós e Oséias", cat:"profetas", bk:"Amós; Oséias",
    ch:["Amós","Oséias","Gômer"],
    d:"Amós clama por justiça social, denunciando a exploração dos pobres. Oséias usa sua própria vida conjugal turbulenta como metáfora do amor fiel de Deus por Israel infiel." },
  { yr:"~740 AC", t:"Isaías — O Profeta Messiânico", cat:"profetas", bk:"Isaías",
    ch:["Isaías","Ezequias","Acaz","Senaqueribe"],
    d:"Isaías profetiza o nascimento virginal, o sofrimento do servo e o reino eterno do Messias — com detalhes impressionantes sete séculos antes de Jesus de Nazaré." },
  { yr:"722 AC", t:"Queda de Samaria", cat:"profetas", bk:"2 Reis 17; Oséias",
    ch:["Salmaneser V","Oséias (rei)","Sargão II"],
    d:"A Assíria conquista e destrói o reino do norte. As dez tribos são deportadas e dispersas — o misterioso desaparecimento das 'dez tribos perdidas de Israel'." },
  { yr:"~630 AC", t:"Jeremias — O Profeta Choroso", cat:"profetas", bk:"Jeremias; Lamentações",
    ch:["Jeremias","Baruc","Jeoiaquim","Sedequias"],
    d:"Chamado desde o ventre materno, Jeremias anuncia o juízo e chora pela ruína de Jerusalém. Profetizou a nova aliança escrita nos corações — cumprida em Cristo." },
  { yr:"605 AC", t:"Daniel na Babilônia", cat:"profetas", bk:"Daniel",
    ch:["Daniel","Sadraque","Mesaque","Abede-Nego","Nabucodonosor"],
    d:"Daniel e seus amigos são levados cativos para a corte babilônica. Fiéis a Deus em terra pagã, sobrevivem à fornalha e à cova dos leões. Recebem visões proféticas sobre os reinos da história." },
  { yr:"586 AC", t:"Destruição do Templo", cat:"profetas", bk:"2 Reis 25; Lamentações; Ezequiel",
    ch:["Nabucodonosor","Sedequias","Ezequiel","Jeremias"],
    d:"Nabucodonosor destrói o Templo de Salomão e incendeia Jerusalém. O povo de Judá é levado ao exílio na Babilônia. A maior tragédia do Antigo Testamento." },
  { yr:"538 AC", t:"Retorno do Exílio — Esdras", cat:"retorno", bk:"Esdras 1–6; Ageu; Zacarias",
    ch:["Ciro o Grande","Zorobabel","Josué (sumo sacerdote)"],
    d:"O rei Ciro da Pérsia, cumprindo profecia de Isaías, decreta o retorno dos judeus. Os primeiros exilados voltam e recomeçam a reconstrução do Templo entre resistências." },
  { yr:"~445 AC", t:"Neemias — Os Muros Reconstruídos", cat:"retorno", bk:"Neemias",
    ch:["Neemias","Esdras","Tobias","Sambalate"],
    d:"Neemias obtém permissão do rei persa e reconstrói os muros de Jerusalém em apenas 52 dias, apesar da oposição feroz. A cidade sagrada é restaurada." },
  { yr:"~5 AC", t:"Nascimento de Jesus", cat:"evangelhos", bk:"Lucas 1–2; Mateus 1–2",
    ch:["Jesus","Maria","José","Herodes","Simeão","Ana"],
    d:"O Verbo eterno se faz carne. Jesus nasce em Belém numa manjedoura. Anjos cantam para pastores, magos viajam do oriente, e o próprio Herodes treme de medo." },
  { yr:"~27 DC", t:"Batismo e Início do Ministério", cat:"evangelhos", bk:"Mateus 3–4; Lucas 3–4",
    ch:["Jesus","João Batista","Satanás"],
    d:"João batiza Jesus no Jordão e uma voz do céu declara: 'Este é meu Filho amado'. Em seguida, Jesus passa 40 dias no deserto resistindo às tentações do diabo." },
  { yr:"~28 DC", t:"O Sermão do Monte", cat:"evangelhos", bk:"Mateus 5–7",
    ch:["Jesus","Apóstolos"],
    d:"O mais profundo discurso ético já proferido. As bem-aventuranças, o Pai Nosso, 'amai os vossos inimigos'. A ética radical e revolucionária do reino de Deus." },
  { yr:"~29 DC", t:"Milagres e Parábolas", cat:"evangelhos", bk:"Marcos; Lucas; João",
    ch:["Jesus","Lázaro","Maria Madalena","Jairo","Bartimeu"],
    d:"Jesus cura cegos, ressuscita Lázaro, alimenta cinco mil com pão e peixe. Suas parábolas — o filho pródigo, o bom samaritano — redefinem quem é o próximo e quem é Deus." },
  { yr:"~33 DC", t:"Última Ceia e Traição", cat:"evangelhos", bk:"Mateus 26; João 13–17",
    ch:["Jesus","Pedro","João","Judas Iscariotes"],
    d:"Na última refeição com seus discípulos, Jesus institui a Ceia do Senhor. Lava os pés dos apóstolos, anuncia a traição de Judas e ora no Getsêmani." },
  { yr:"~33 DC", t:"Crucificação e Ressurreição", cat:"evangelhos", bk:"Todos os Evangelhos",
    ch:["Jesus","Pedro","João","Pilatos","Maria Madalena","Simão de Cirene"],
    d:"A semana mais importante da história. Jesus é julgado, crucificado no Gólgota e sepultado. No terceiro dia ressuscita dos mortos — o evento central e fundacional da fé cristã." },
  { yr:"~33 DC", t:"Pentecostes — Nasce a Igreja", cat:"igreja", bk:"Atos 2",
    ch:["Pedro","Apóstolos","Maria","Estêvão"],
    d:"O Espírito Santo desce sobre os discípulos como línguas de fogo. Pedro prega com poder e três mil pessoas se convertem em um único dia. A Igreja cristã nasce aqui." },
  { yr:"~35 DC", t:"Conversão de Paulo", cat:"igreja", bk:"Atos 9; Gálatas 1",
    ch:["Paulo (Saulo)","Ananias","Barnabé"],
    d:"Saulo, fervoroso perseguidor de cristãos, encontra Jesus ressurreto no caminho de Damasco. Cego por três dias, é transformado em Paulo — o maior missionário da história." },
  { yr:"~48–60 DC", t:"As Viagens Missionárias", cat:"igreja", bk:"Atos 13–21; Epístolas de Paulo",
    ch:["Paulo","Barnabé","Silas","Timóteo","Priscila","Áquila","Lídia"],
    d:"Paulo percorre o mundo mediterrâneo em três grandes viagens missionárias. Funda igrejas em Filipos, Corinto e Éfeso. Suas cartas tornam-se metade do Novo Testamento." },
  { yr:"70 DC", t:"Destruição de Jerusalém", cat:"igreja", bk:"Lucas 21; Josefo",
    ch:["Tito (general romano)","Vespasiano"],
    d:"Roma destrói Jerusalém e o Segundo Templo cumprindo a profecia de Jesus. Um milhão de judeus morrem. O judaísmo rabínico e o cristianismo seguem caminhos definitivamente separados." },
  { yr:"~95 DC", t:"Apocalipse — João em Patmos", cat:"igreja", bk:"Apocalipse",
    ch:["João","Jesus (glorificado)"],
    d:"O apóstolo João, exilado na ilha de Patmos, recebe visões do Cristo glorificado. O livro final da Bíblia revela a consumação da história: a nova Jerusalém descendo do céu." },
];

// ── Build ──────────────────────────────────────────────────────
const CARD_W = 218, SPACING = 310, START = 90, STEM = 48;
let activeFilter = 'all';

const tlScroll  = document.getElementById('tlScroll');
const tlCanvas  = document.getElementById('tlCanvas');
const mmTrack   = document.getElementById('mmTrack');

function build() {
  // Clear cards/dots (keep .tl-line)
  [...tlCanvas.children].forEach(c => { if (!c.classList.contains('tl-line')) c.remove(); });
  mmTrack.innerHTML = '<div class="mm-line"></div>';

  const totalW = START * 2 + EVENTS.length * SPACING;
  const H = tlScroll.offsetHeight;
  const lineY = H / 2;
  const trackW = mmTrack.offsetWidth;
  const scale  = trackW / totalW;

  tlCanvas.style.width = totalW + 'px';

  EVENTS.forEach((ev, i) => {
    const cx = START + CARD_W / 2 + i * SPACING; // dot center x
    const cardX = cx - CARD_W / 2;
    const above = i % 2 === 0;

    // Card
    const card = document.createElement('div');
    card.className = 'ev-card';
    card.dataset.cat = ev.cat;
    card.style.left = cardX + 'px';
    card.style.top  = above
      ? (lineY - STEM - 185) + 'px'
      : (lineY + STEM) + 'px';

    card.innerHTML = `
      <div class="card-yr">${ev.yr}</div>
      <div class="card-title">${ev.t}</div>
      <span class="card-badge c-${ev.cat}">${CAT[ev.cat]}</span>
      <div class="card-desc">${ev.d}</div>
      <div class="card-chars">${ev.ch.slice(0,3).map(c=>`<span class="char-pill">${c}</span>`).join('')}</div>
    `;
    card.addEventListener('click', () => openDetail(ev));
    tlCanvas.appendChild(card);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'tl-dot';
    dot.style.left = cx + 'px';
    dot.style.top  = lineY + 'px';
    tlCanvas.appendChild(dot);

    // Stem
    const stem = document.createElement('div');
    stem.className = 'tl-stem';
    stem.style.left   = cx + 'px';
    stem.style.top    = above ? (lineY - STEM) + 'px' : lineY + 'px';
    stem.style.height = STEM + 'px';
    tlCanvas.appendChild(stem);

    // Year tag
    const tag = document.createElement('div');
    tag.className = 'tl-yr-tag';
    tag.style.left = cx + 'px';
    tag.style.top  = above ? (lineY + 10) + 'px' : (lineY - 22) + 'px';
    tag.textContent = ev.yr;
    tlCanvas.appendChild(tag);

    // Minimap dot
    const md = document.createElement('div');
    md.className = 'mm-dot';
    md.dataset.cat = ev.cat;
    md.style.left = (cx * scale) + 'px';
    mmTrack.appendChild(md);
  });

  // Viewport indicator
  const vp = document.createElement('div');
  vp.className = 'mm-viewport';
  vp.id = 'mmVp';
  const vpW = Math.max(30, (tlScroll.offsetWidth / totalW) * trackW);
  vp.style.width = vpW + 'px';
  mmTrack.appendChild(vp);
  updateMM();

  applyFilter();
}

function updateMM() {
  const vp = document.getElementById('mmVp');
  if (!vp) return;
  const totalW = parseFloat(tlCanvas.style.width) || 1;
  const trackW = mmTrack.offsetWidth;
  const scale = trackW / totalW;
  vp.style.left = (tlScroll.scrollLeft * scale) + 'px';
}

function applyFilter() {
  document.querySelectorAll('.ev-card').forEach(c => {
    c.classList.toggle('dim', activeFilter !== 'all' && c.dataset.cat !== activeFilter);
  });
  document.querySelectorAll('.mm-dot').forEach(d => {
    d.style.opacity = activeFilter === 'all' || d.dataset.cat === activeFilter ? '.7' : '.15';
  });
}

// ── Drag scroll ────────────────────────────────────────────────
let drag = false, sx = 0, sl = 0;
tlScroll.addEventListener('mousedown', e => {
  drag = true; sx = e.pageX; sl = tlScroll.scrollLeft;
  tlScroll.classList.add('grabbing');
});
document.addEventListener('mouseup', () => { drag = false; tlScroll.classList.remove('grabbing'); });
document.addEventListener('mousemove', e => {
  if (!drag) return;
  e.preventDefault();
  tlScroll.scrollLeft = sl - (e.pageX - sx) * 1.4;
  updateMM();
});
tlScroll.addEventListener('scroll', updateMM);

// Touch
let tx = 0, tl = 0;
tlScroll.addEventListener('touchstart', e => { tx = e.touches[0].pageX; tl = tlScroll.scrollLeft; }, {passive:true});
tlScroll.addEventListener('touchmove',  e => { tlScroll.scrollLeft = tl - (e.touches[0].pageX - tx); updateMM(); }, {passive:true});

// Wheel horizontal
tlScroll.addEventListener('wheel', e => {
  if (Math.abs(e.deltaY) > Math.abs(e.deltaX)) {
    e.preventDefault();
    tlScroll.scrollLeft += e.deltaY * 2.5;
    updateMM();
  }
}, { passive: false });

// ── Minimap click ──────────────────────────────────────────────
mmTrack.addEventListener('click', e => {
  const rect = mmTrack.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const totalW = parseFloat(tlCanvas.style.width) || 1;
  const scale = rect.width / totalW;
  tlScroll.scrollLeft = cx / scale - tlScroll.offsetWidth / 2;
  updateMM();
});

// ── Filter ─────────────────────────────────────────────────────
document.getElementById('filters').addEventListener('click', e => {
  const btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.cat;
  applyFilter();
});

// ── Detail panel ───────────────────────────────────────────────
function openDetail(ev) {
  document.getElementById('dYr').textContent    = ev.yr;
  document.getElementById('dTitle').textContent = ev.t;
  document.getElementById('dBook').textContent  = '📖 ' + ev.bk;
  document.getElementById('dDesc').textContent  = ev.d;
  document.getElementById('dChars').innerHTML   = ev.ch.map(c =>
    `<span class="d-char" onclick="window.charSearch('${c.replace(/'/g,"\\'")}',event)">${c}</span>`
  ).join('');
  document.getElementById('overlay').classList.add('open');
}

window.charSearch = (name, e) => {
  e.stopPropagation();
  document.getElementById('overlay').classList.remove('open');
  // Future: open character profile
  setTimeout(() => alert(`🔍 Perfil de "${name}" — em breve!\n\nEsta funcionalidade abrirá a rede de relacionamentos do personagem com livros, eventos e outros personagens.`), 150);
};

document.getElementById('dClose').addEventListener('click', () =>
  document.getElementById('overlay').classList.remove('open'));
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay'))
    document.getElementById('overlay').classList.remove('open');
});

// ── Init ───────────────────────────────────────────────────────
window.addEventListener('load', () => setTimeout(build, 80));
window.addEventListener('resize', () => setTimeout(build, 80));
</script>
